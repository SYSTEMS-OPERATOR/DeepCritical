name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint and format
        run: |
          uv run ruff check .
          uv run black --check .

      - name: Type check
        run: uv run mypy --install-types --non-interactive .

      - name: Security audit
        run: |
          uv run pip-audit -r pyproject.toml
          uv run bandit -q -r DeepResearch

      - name: Circular import check
        run: uv run pycycle --disable dynamic-import --package DeepResearch
        continue-on-error: true

      - name: Run tests with coverage
        env:
          PYTHONWARNINGS: default
        run: |
          uv run pytest --maxfail=1 --disable-warnings --cov=DeepResearch --cov-report=xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Build documentation
        run: uv run mkdocs build --strict
