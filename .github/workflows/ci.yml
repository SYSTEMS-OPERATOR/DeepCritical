name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Lint (ruff) & format check (black)
        run: |
          uv run ruff check .
          uv run black --check .

      - name: Type-check (mypy)
        run: uv run mypy .

      - name: Check for circular imports
        run: uv run pycycle DeepResearch

      - name: Run tests with coverage
        env:
          PYTHONWARNINGS: default
        run: |
          uv run pytest -q \
            -m "not vllm and not optional" \
            --disable-warnings \
            --maxfail=1 \
            --cov=DeepResearch \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Security audit (pip-audit + bandit)
        run: |
          uv run pip-audit -r pyproject.toml || true
          uv run bandit -q -r DeepResearch || true

  docs:
    runs-on: ubuntu-latest
    needs: quality-and-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Build documentation
        run: uv run mkdocs build --strict
